name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linting
        run: |
          pip install flake8
          flake8 --max-line-length 120 --exclude venv,instance,__pycache__ .

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

      - name: Validate Python files
        run: |
          python -c "
          import ast, glob, sys
          errors = []
          for f in glob.glob('**/*.py', recursive=True):
              if 'venv' in f: continue
              try:
                  with open(f) as fh: ast.parse(fh.read())
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('Syntax errors found:')
              for e in errors: print(f'  {e}')
              sys.exit(1)
          print('All Python files pass ast.parse()')
          "

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t finsight .

      - name: Test Docker container starts
        run: |
          docker run -d --name finsight-test -p 8080:8080 finsight
          sleep 5
          curl -f http://localhost:8080/ || exit 1
          docker stop finsight-test
